<!--
Yes/No interactive website (Traditional Chinese variation).

Displays a question with a Yes button and a No button. Each click on No
shrinks the No button and grows the Yes button while moving it toward the
center of the screen, and swaps in a new reaction image. After five No
clicks, the No button starts evading the cursor. Clicking Yes ends the
interaction with a closing message and a celebration image.
-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; base-uri 'self'; form-action 'none';">
  <title>願意還是不願意</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <main id="app">
    <h1 id="question">你願意成為我的情人嗎？💕</h1>

    <div id="image-stage">
      <img id="stage-image" src="../images/no-0.gif" alt="反應圖片">
    </div>

    <div id="button-stage">
      <button id="yes-btn" class="btn yes-btn" type="button">願意</button>
      <button id="no-btn" class="btn no-btn" type="button">不願意</button>
    </div>

    <section id="ending" class="hidden">
      <p>就知道你會說願意！🎉</p>
      <img id="ending-image" src="../images/yes.webp" alt="慶祝圖片">
      <p>我好開心！</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
